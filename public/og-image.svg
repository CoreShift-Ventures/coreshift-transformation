<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Light background gradient matching hero -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e8edf5"/>
    </linearGradient>

    <!-- Soft blue glow from bottom (matching hero radial gradient) -->
    <radialGradient id="glow" cx="50%" cy="100%" r="80%">
      <stop offset="0%" style="stop-color:rgba(200, 210, 240, 0.6)"/>
      <stop offset="50%" style="stop-color:rgba(180, 195, 235, 0.3)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>

  <!-- Soft blue glow overlay -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(0,0,0,0.02)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo: Core·shift -->
  <text x="80" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#1a1a1a">
    <tspan font-weight="400">Core</tspan><tspan fill="#4d65ff" font-weight="600">·</tspan><tspan font-weight="600">shift</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#888" letter-spacing="3">
    AGENTS AS A SERVICE
  </text>

  <!-- Main headline -->
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="500" fill="#1a1a1a" letter-spacing="-1">
    Enterprise operations.
  </text>
  <text x="80" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="500" fill="#1a1a1a" letter-spacing="-1">
    Now agent-powered.
  </text>

  <!-- Subheadline -->
  <text x="80" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#555">
    We build it. You run it. We maintain it.
  </text>

  <!-- Command Center Live indicator -->
  <g transform="translate(80, 510)">
    <rect x="0" y="0" width="280" height="44" rx="6" fill="white" fill-opacity="0.7" stroke="#e5e5e5" stroke-width="1"/>
    <circle cx="20" cy="22" r="4" fill="#22c55e"/>
    <text x="35" y="27" font-family="ui-monospace, monospace" font-size="11" fill="#888" letter-spacing="2">
      COMMAND CENTER
    </text>
    <text x="180" y="27" font-family="ui-monospace, monospace" font-size="11" fill="#22c55e" font-weight="600">
      LIVE
    </text>
  </g>

  <!-- URL -->
  <text x="1120" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#4d65ff" text-anchor="end">
    cshift.io
  </text>

  <!-- Decorative accent lines (right side) -->
  <rect x="1050" y="200" width="80" height="3" rx="1.5" fill="#4d65ff" opacity="0.3"/>
  <rect x="1070" y="215" width="60" height="3" rx="1.5" fill="#4d65ff" opacity="0.2"/>
  <rect x="1090" y="230" width="40" height="3" rx="1.5" fill="#4d65ff" opacity="0.1"/>
</svg>
