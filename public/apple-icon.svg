<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <!-- C letter -->
  <text x="24" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="500" fill="#ffffff">C</text>
  <!-- Blue dot -->
  <circle cx="90" cy="100" r="10" fill="#4d65ff"/>
  <!-- S letter -->
  <text x="100" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff">S</text>
</svg>
